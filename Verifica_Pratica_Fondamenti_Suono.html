<style>

.back-btn{position:fixed;top:16px;left:16px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;z-index:999;text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:var(--accent1)}
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--accent1);color:#fff;border:none;font-size:1.2rem;cursor:pointer;z-index:999;display:none;align-items:center;justify-content:center}
.scroll-top.show{display:flex}
.app{max-width:800px;margin:0 auto;padding:60px 20px 40px}
header{text-align:center;padding:20px 0 30px}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;background:linear-gradient(135deg,#fff,var(--accent3),var(--accent1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}

.filters button{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:8px 16px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s}
.filters button:hover{color:var(--text);border-color:var(--accent1)}
.filters button.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border-color:transparent}
.section{margin-bottom:40px;display:none}

// --- Smart validation helpers ---
function normalize(s){
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // remove accents
    .replace(/[''`]/g,"'")
    .replace(/\s+/g,' '); // collapse spaces
}

function similarity(a,b){
  // Levenshtein distance ratio
  const la=a.length, lb=b.length;
  if(!la||!lb) return 0;
  const mx=Math.max(la,lb);
  const dp=Array.from({length:la+1},()=>Array(lb+1).fill(0));
  for(let i=0;i<=la;i++) dp[i][0]=i;
  for(let j=0;j<=lb;j++) dp[0][j]=j;
  for(let i=1;i<=la;i++) for(let j=1;j<=lb;j++){
    const cost=a[i-1]===b[j-1]?0:1;
    dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
  }
  return 1 - dp[la][lb]/mx;
}

function checkAnswer(val, acceptedAnswers){
  const nVal = normalize(val);
  if(!nVal) return {status:'empty'};
  // Exact match (normalized)
  for(const a of acceptedAnswers){
    if(nVal === normalize(a)) return {status:'correct', match:a};
  }
  // Similar match (>= 0.75 similarity)
  let bestSim=0, bestMatch='';
  for(const a of acceptedAnswers){
    const sim = similarity(nVal, normalize(a));
    if(sim > bestSim){ bestSim=sim; bestMatch=a; }
  }
  if(bestSim >= 0.75) return {status:'almost', match:bestMatch, sim:bestSim};
  // Contains check: if the answer is fully contained in user input or vice versa
  for(const a of acceptedAnswers){
    const na = normalize(a);
    if(nVal.includes(na) || na.includes(nVal)) return {status:'almost', match:a, sim:0.8};
  }
  return {status:'wrong', closest:bestMatch};
}

function showSection(id,btn){

  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById('mc-list').innerHTML=mcData.map((d,i)=>`
<div class="q-card" id="mc-${i}">
  <div class="q-num">Domanda ${i+1}/${mcData.length}</div>
  <div class="q-text">${d.q}</div>
  <button class="hint-btn" onclick="event.stopPropagation();this.nextElementSibling.classList.toggle('show')">💡 Suggerimento ES</button>
  <div class="hint-text">${d.hint}</div>
  <div class="mc-options">
    ${d.opts.map((o,j)=>`<button class="mc-opt" onclick="selectMC(${i},${j},this)">${String.fromCharCode(65+j)}) ${o}</button>`).join('')}
  </div>
  <div class="feedback" id="fb-mc-${i}"></div>
</div>`).join('');

const mcAnswers={};
function selectMC(i,j,btn){
  mcAnswers[i]=j;
  btn.parentElement.querySelectorAll('.mc-opt').forEach(b=>{b.classList.remove('selected-correct','selected-wrong');b.style.opacity='.5'});
  btn.style.opacity='1';
}

function checkAll(type){
  let correct=0,total=0;
  if(type==='vf'){
    total=vfData.length;
    vfData.forEach((d,i)=>{
      const card=document.getElementById('vf-'+i);
      const fb=document.getElementById('fb-vf-'+i);
      const isCorrect=vfAnswers[i]===d.a;
      if(vfAnswers[i]!==undefined){
        card.classList.add(isCorrect?'correct':'wrong');
        const btns=card.querySelectorAll('.vf-btns button');
        btns.forEach(b=>{b.style.opacity='1';b.classList.remove('selected-correct','selected-wrong')});
        if(isCorrect){btns[d.a?0:1].classList.add('selected-correct');correct++}
        else{btns[d.a?1:0].classList.add('selected-wrong');btns[d.a?0:1].classList.add('selected-correct')}
      }else{card.classList.add('wrong')}
      fb.classList.add('show',isCorrect?'correct-fb':'wrong-fb');
    });
    document.getElementById('scoreNum-vf').textContent=correct+' / '+total;
    document.getElementById('score-vf').classList.add('show');
  }else if(type==='comp'){
    total=compData.length;
    let almost=0;
    compData.forEach((d,i)=>{
      const input=document.getElementById('fill-'+i);
      const fb=document.getElementById('fb-comp-'+i);
      const card=document.getElementById('comp-'+i);
      const result=checkAnswer(input.value, d.a);
      input.classList.remove('correct','wrong','almost');
      card.classList.remove('correct','wrong','almost');
      fb.classList.remove('correct-fb','wrong-fb','almost-fb');
      if(result.status==='correct'){
        input.classList.add('correct'); card.classList.add('correct');
        fb.innerHTML='✅ Corretto!';
        fb.classList.add('show','correct-fb');
        correct++;
      } else if(result.status==='almost'){
        input.classList.add('almost'); card.classList.add('almost');
        fb.innerHTML='🟡 Quasi corretto! La risposta esatta è: <strong>'+d.a[0]+'</strong>';
        fb.classList.add('show','almost-fb');
        almost++;
      } else {
        input.classList.add('wrong'); card.classList.add('wrong');
        fb.innerHTML=result.status==='empty'?'⚠️ Non hai risposto. Risposta corretta: <strong>'+d.a[0]+'</strong>':'❌ Risposta corretta: <strong>'+d.a[0]+'</strong>';
        fb.classList.add('show','wrong-fb');
      }
    });
    const label=almost>0?' (+ '+almost+' quasi corrette)':'';
    document.getElementById('scoreNum-comp').textContent=correct+' / '+total+label;
    document.getElementById('score-comp').classList.add('show');
  }else if(type==='mc'){
    total=mcData.length;
    mcData.forEach((d,i)=>{
      const card=document.getElementById('mc-'+i);
      const fb=document.getElementById('fb-mc-'+i);
      const opts=card.querySelectorAll('.mc-opt');
      const isCorrect=mcAnswers[i]===d.correct;
      opts.forEach((o,j)=>{o.style.opacity='1';o.classList.remove('selected-correct','selected-wrong');if(j===d.correct)o.classList.add('selected-correct');else if(j===mcAnswers[i])o.classList.add('selected-wrong')});
      card.classList.add(isCorrect?'correct':'wrong');
      fb.innerHTML=isCorrect?'✅ Corretto!':'❌ La risposta corretta era: <strong>'+String.fromCharCode(65+d.correct)+') '+d.opts[d.correct]+'</strong>';
      fb.classList.add('show',isCorrect?'correct-fb':'wrong-fb');
      if(isCorrect)correct++;
    });
    document.getElementById('scoreNum-mc').textContent=correct+' / '+total;
    document.getElementById('score-mc').classList.add('show');
  }
}

function showOpenAnswers(){
  openData.forEach((d,i)=>{
    const fb=document.getElementById('fb-open-'+i);
    fb.classList.add('show','correct-fb');
  });
}

window.addEventListener('scroll',()=>{document.getElementById('scrollTop').classList.toggle('show',window.scrollY>300)});
</script>
</body>
